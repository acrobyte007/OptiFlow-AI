name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ] # Change to master if your default GitHub branch is master

  # Allows you to trigger the sync manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://ajoy0071998:$HF_TOKEN@huggingface.co/spaces/ajoy0071998/optiflow main
