name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ] # Change to master if your branch is named master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.PRIVATE_KEY }}
          known_hosts: 'placeholder'

      - name: Add HF to Known Hosts
        run: |
          ssh-keyscan -t ed25519 huggingface.co >> ~/.ssh/known_hosts

      - name: Push to Hugging Face
        run: |
          git remote add hf git@huggingface.co:spaces/ajoy0071998/optiflow
          git push -f hf main
